<!DOCTYPE html>
<html>
<head>
<style>
.image-container {
  position: relative;
  width: 400px;
  margin: 50px auto;
  border-radius: 10px;
  overflow: hidden;
}

.image-container img {
  width: 100%;
  display: block;
}

.text {
  position: absolute;
  top: 50%;    /* Initial center */
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  font-weight: bold;
  color: white;
  text-shadow: 2px 2px 5px black;
  cursor: pointer;
  transition: top 0.5s ease, left 0.5s ease; /* Smooth movement */
}
</style>
</head>
<body>

<div class="image-container" id="container">
  <img src="https://plus.unsplash.com/premium_photo-1682092612468-402166855833?w=600&auto=format&fit=crop&q=60" alt="Holi photo">
  <div class="text" id="holiText">Happy Holi 🌈</div>
</div>

<script>
const container = document.getElementById('container');
const text = document.getElementById('holiText');

text.addEventListener('click', () => {
  // Container size
  const containerWidth = container.clientWidth;
  const containerHeight = container.clientHeight;

  // Text size
  const textWidth = text.offsetWidth;
  const textHeight = text.offsetHeight;

  // Random position inside image
  const randomLeft = Math.random() * (containerWidth - textWidth);
  const randomTop = Math.random() * (containerHeight - textHeight);

  // Apply new position
  text.style.left = randomLeft + 'px';
  text.style.top = randomTop + 'px';
  text.style.transform = 'translate(0,0)'; // remove previous centering transform
});
</script>

</body>
</html>
